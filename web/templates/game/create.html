{% extends 'base.html' %}
{% load static %}

{% block title %}Создать игру | ИнвестТренажер{% endblock %}

{% block content %}
<div class="container py-4" style="max-width: 600px;">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="display-5 fw-bold">Создать игру</h1>
    <a href="{% url 'game:list' %}" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-left"></i> Назад
    </a>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label for="name" class="form-label fw-bold">Название игры</label>
          <input type="text" class="form-control" id="name" name="name" required maxlength="200">
        </div>
        <div class="mb-3">
          <label for="description" class="form-label fw-bold">Описание</label>
          <textarea class="form-control" id="description" name="description" rows="3"></textarea>
        </div>
        <div class="mb-3">
          <label for="start_capital" class="form-label fw-bold">Стартовый капитал (₽)</label>
          <input type="number" class="form-control" id="start_capital" name="start_capital" value="1000000"
                 step="10000">
          <div class="form-text">Каждый игрок получит эту сумму в начале игры</div>
        </div>
        <button type="submit" class="btn btn-success w-100">
          <i class="bi bi-plus-lg"></i> Создать игру
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
