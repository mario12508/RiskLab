{% load static %}
<header class="py-3 px-10 sticky-top backdrop-blur bg-body bg-opacity-75 shadow-sm border-bottom">
  <div class="container d-flex flex-wrap justify-content-between align-items-center">
    <a href="{% url 'homepage:home' %}" class="d-flex align-items-center text-decoration-none text-body">
      <img src="{% static 'img/favicon.svg' %}" alt="Logo" width="32" height="32" class="me-2 site-logo">
      <span class="fs-4 fw-semibold">НТО Финтех</span>
    </a>

    <div class="d-flex align-items-center gap-3">
      <button onclick="window.themeToggle()" class="btn btn-sm btn-outline-secondary rounded-circle p-2 d-flex align-items-center justify-content-center" style="width: 38px; height: 38px;">
        <i id="theme-icon" class="bi bi-brightness-high"></i>
      </button>

      {% if user.is_authenticated %}
        <div class="dropdown">
          <a href="#" class="d-flex align-items-center text-decoration-none dropdown-toggle text-body" data-bs-toggle="dropdown" aria-expanded="false">
            <div class="avatar-wrapper me-2">
              {% if user.image %}
                <img src="{{ user.image.url }}" alt="{{ user.username }}" width="35" height="35" class="rounded-circle border">
              {% else %}
                <div class="avatar-initials rounded-circle border d-flex align-items-center justify-content-center"
                     style='width: 35px; height: 35px; background-color: hsl({{ user.username|make_list|slice:":3"|join:""|add:"0"|slice:":3" }}, 70%, 55%);'>
                  <span class="text-white fw-semibold" style="font-size: 1rem; line-height: 1;">
                    {{ user.username.0|upper }}
                  </span>
                </div>
              {% endif %}
            </div>
            <span class="fw-medium d-none d-sm-inline">{{ user.username }}</span>
          </a>

          <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2 py-2">
            <li>
              <a class="dropdown-item d-flex align-items-center gap-2 py-2" href="{% url 'users:profile' %}">
                <i class="bi bi-person text-secondary"></i> Профиль
              </a>
            </li>
            <li><hr class="dropdown-divider opacity-50"></li>
            <li>
              <form method="post" action="{% url 'users:logout' %}" class="m-0">
                {% csrf_token %}
                <button type="submit" class="dropdown-item d-flex align-items-center gap-2 py-2 text-danger">
                  <i class="bi bi-box-arrow-right"></i> Выйти
                </button>
              </form>
            </li>
          </ul>
        </div>

      {% else %}
        <div class="d-flex gap-2">
          <a href="{% url 'users:login' %}" class="btn btn-sm fw-medium px-3 d-flex align-items-center gap-1 login-btn">
            <i class="bi bi-box-arrow-in-right"></i> Вход
          </a>
        </div>
      {% endif %}
    </div>
  </div>
</header>

<style>
  .backdrop-blur {
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
  }

  .dropdown-menu {
      min-width: 200px;
      border-radius: 12px;
  }

  .dropdown-item {
      transition: background 0.2s ease;
  }

  .avatar-wrapper {
      transition: transform 0.2s ease;
  }

  .dropdown:hover .avatar-wrapper {
      transform: scale(1.1);
  }

  header {
      user-select: none;
  }

  .dropdown-toggle::after {
      vertical-align: middle;
      margin-left: 0.5em;
  }

  .avatar-initials {
      background-color: #6c757d; /* fallback */
      transition: all 0.2s ease;
  }

  .login-btn, .register-btn {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(4px);
    border: 1px solid rgba(0, 0, 0, 0.1);
    border-radius: 40px;
    transition: all 0.2s ease;
    color: var(--text-primary, #212529);
  }

  .login-btn:hover, .register-btn:hover {
    background: linear-gradient(135deg, #0d6efd, #0b5ed7);
    border-color: transparent;
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 4px 10px rgba(13, 110, 253, 0.2);
  }

  [data-bs-theme="dark"] .login-btn,
  [data-bs-theme="dark"] .register-btn {
    background: rgba(0, 0, 0, 0.3);
    border-color: rgba(255, 255, 255, 0.2);
    color: #f8f9fa;
  }

  [data-bs-theme="dark"] .login-btn:hover,
  [data-bs-theme="dark"] .register-btn:hover {
    background: linear-gradient(135deg, #0d6efd, #0b5ed7);
    color: white;
  }
</style>
